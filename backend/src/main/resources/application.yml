spring:
  datasource:
    url: jdbc:h2:file:./data/planner;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
app:
  jwt:
    secret: "local-dev-secret-change-me-please-make-it-long-enough-256bit"
    expiration-ms: 86400000
  storage:
    dir: ./uploads
